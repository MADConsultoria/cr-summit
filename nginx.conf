server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # The production domain serves this project at the root, without /cr-summit.
  location = /cr-summit {
    return 301 https://$host/;
  }

  location ~* ^/cr-summit/(.*)$ {
    return 301 https://$host/$1$is_args$args;
  }

  # Accept /encontro/OBRIGADO (any case) and serve the canonical thank-you page.
  location ~* ^/encontro/obrigado/?$ {
    try_files /encontro/obrigado/index.html =404;
  }

  # Serve inscription pages explicitly before the root fallback.
  location ~* ^/inscricao/?$ {
    try_files /inscricao/index.html =404;
  }

  location ~* ^/inscricao/obrigado/?$ {
    try_files /inscricao/obrigado/index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
